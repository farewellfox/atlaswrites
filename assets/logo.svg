<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72" fill="none">
  <!-- Ink bottle body -->
  <rect x="18" y="32" width="36" height="32" rx="4" fill="#EDE7DB" stroke="#5C3A1E" stroke-width="1.5"/>
  <!-- Ink fill inside bottle -->
  <rect x="19.5" y="46" width="33" height="17.5" rx="2.5" fill="#2C2420" opacity="0.18"/>
  <!-- Bottle neck -->
  <rect x="26" y="20" width="20" height="14" rx="3" fill="#EDE7DB" stroke="#5C3A1E" stroke-width="1.5"/>
  <!-- Bottle cap -->
  <rect x="23" y="14" width="26" height="9" rx="3" fill="#5C3A1E"/>
  <!-- Cap highlight -->
  <rect x="25" y="16" width="22" height="3" rx="1.5" fill="#8B6914" opacity="0.5"/>
  <!-- Label area -->
  <rect x="22" y="38" width="28" height="18" rx="2" fill="#FFFDF8" stroke="#D4C5B2" stroke-width="0.75"/>
  <!-- Label lines (suggest text) -->
  <line x1="26" y1="44" x2="46" y2="44" stroke="#D4C5B2" stroke-width="1"/>
  <line x1="28" y1="49" x2="44" y2="49" stroke="#D4C5B2" stroke-width="1"/>
  <line x1="30" y1="54" x2="42" y2="54" stroke="#D4C5B2" stroke-width="1"/>
  <!-- Ink drip on neck -->
  <ellipse cx="36" cy="32" rx="4" ry="1.5" fill="#2C2420" opacity="0.12"/>
</svg>
