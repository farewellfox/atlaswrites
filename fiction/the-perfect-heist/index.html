<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/assets/inkbottle.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Perfect Heist — atlas | writes</title>
  <meta name="description" content="Five years after walking out of the Accord, the criminal organization nobody walks out of, he's back in Merranth with a bag of stolen trinkets, a frozen debt, and a scheme to rob the Pendleton vault during the Royal Procession. He needs a crew. An old partner who hasn't worked in a decade. A woman who's smarter than him and won't let him forget it. And the backing of the most dangerous man in Merranth, who wants something in return that Tav isn't ready to give.">
  <meta property="og:title" content="The Perfect Heist">
  <meta property="og:description" content="Five years after walking out of the Accord, the criminal organization nobody walks out of, he's back in Merranth with a bag of stolen trinkets, a frozen debt, and a scheme to rob the Pendleton vault during the Royal Procession. He needs a crew. An old partner who hasn't worked in a decade. A woman who's smarter than him and won't let him forget it. And the backing of the most dangerous man in Merranth, who wants something in return that Tav isn't ready to give.">
  <meta property="og:url" content="https://atlaswrites.com/fiction/the-perfect-heist/">
  <meta property="og:type" content="article">
  <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>

  <nav class="site-nav" aria-label="Site navigation">
    <a href="/" class="site-nav-brand">atlas | writes</a>
    <ul class="site-nav-links">
      <li><a href="/fiction/" class="active">Fiction</a></li>
      <li aria-hidden="true" class="site-nav-dot">&middot;</li>
      <li><a href="/prose/">Prose</a></li>
      <li aria-hidden="true" class="site-nav-dot">&middot;</li>
      <li><a href="/comics/">Comics</a></li>
      <li aria-hidden="true" class="site-nav-dot">&middot;</li>
      <li><a href="/contact/">Contact</a></li>
    </ul>
  </nav>

  <main class="reading-page">

    <a href="/fiction/" class="reading-back">&larr; Back to fiction</a>

    <div id="story-header"></div>
    <hr class="reading-divider">

    <div id="story-content" class="reading-body">
      <p class="loading-msg">Loading story…</p>
    </div>

    <div id="story-footer"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script>
    (async () => {
      /* ── Fetch the .md file ── */
      let raw;
      try {
        const res = await fetch('../the-perfect-heist.md');
        if (!res.ok) throw new Error(res.status);
        raw = await res.text();
      } catch (e) {
        document.getElementById('story-content').innerHTML =
          '<p class="loading-msg">Story not found.</p>';
        return;
      }

      /* ── Parse frontmatter ── */
      let meta = {};
      let body = raw;
      if (raw.startsWith('---')) {
        const end = raw.indexOf('---', 3);
        if (end !== -1) {
          const fm = raw.slice(3, end).trim();
          fm.split('\n').forEach(line => {
            const i = line.indexOf(':');
            if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
          });
          body = raw.slice(end + 3).trim();
        }
      }

      /* ── Set header ── */
      const title = meta.title || 'The Perfect Heist';

      document.getElementById('story-header').innerHTML = `
        <h1 class="reading-title">${title}</h1>
        ${meta.author ? `<p class="reading-author">by ${meta.author}</p>` : ''}
        ${meta.meta   ? `<p class="reading-meta">${meta.meta}</p>` : ''}
      `;

      /* ── Custom marked renderer ── */
      const renderer = new marked.Renderer();

      // ## Part X  →  part header
      // ### 1      →  chapter number
      renderer.heading = function({ text, depth }) {
        if (depth === 2) return `<p class="reading-part-header">${text}</p>\n`;
        if (depth === 3) return `<p class="reading-chapter">${text}</p>\n`;
        return `<h${depth}>${text}</h${depth}>\n`;
      };

      // ---  →  scene break dots (not <hr>)
      renderer.hr = function() {
        return '<p class="reading-break">&middot; &middot; &middot;</p>\n';
      };

      marked.setOptions({ renderer, breaks: false, gfm: true });

      /* ── Render ── */
      document.getElementById('story-content').innerHTML = marked.parse(body);

      /* ── Footer ── */
      let footer = '<hr class="reading-divider" style="margin-top: 3rem;">';
      footer += '<a href="/fiction/" class="reading-back">&larr; Back to fiction</a>';
      if (meta.royal_road) {
        footer += `<p class="reading-royal-road">Also available on <a href="${meta.royal_road}" target="_blank" rel="noopener noreferrer">Royal Road</a></p>`;
      }
      document.getElementById('story-footer').innerHTML = footer;
    })();
  </script>
</body>
</html>
